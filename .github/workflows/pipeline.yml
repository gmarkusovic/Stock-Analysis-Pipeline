name: Stock Analysis Pipeline

on:
  schedule:
    - cron: '0 23 * * 1'   # Every Monday at 23:00 UTC
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check secrets are set
        env:
          P1: ${{ secrets.GOOGLE_PRIVATE_KEY_P1 }}
          EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          SHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        run: |
          [ -z "$P1" ]      && echo "ERROR: GOOGLE_PRIVATE_KEY_P1 not set"    && exit 1 || true
          [ -z "$EMAIL" ]   && echo "ERROR: GOOGLE_CLIENT_EMAIL not set"       && exit 1 || true
          [ -z "$SHEET_ID" ] && echo "ERROR: GOOGLE_SPREADSHEET_ID not set"   && exit 1 || true
          echo "Secrets OK — email=$EMAIL  sheet=$SHEET_ID  key_p1_len=${#P1}"

      - name: Run pipeline
        env:
          GOOGLE_PRIVATE_KEY_P1: ${{ secrets.GOOGLE_PRIVATE_KEY_P1 }}
          GOOGLE_PRIVATE_KEY_P2: ${{ secrets.GOOGLE_PRIVATE_KEY_P2 }}
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        run: python orchestrator.py --yfinance --now
